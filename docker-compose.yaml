version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_cryptocampus
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: cryptocampusdb
    ports:
      - "5435:5432"
    volumes:
      - dev-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d cryptocampusdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dev-db-data:
